<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>홀덤 마스터 — 토너먼트 & 복기</title>
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>

<div id="screen-menu" class="screen active">
  <div class="menu-wrap">
    <h1 class="logo">♠ 홀덤 마스터</h1>
    <p class="subtitle">로컬 토너먼트 & AI 복기 · 교육 모드</p>

    <section id="profile-card" class="menu-section profile-card">
      <!-- 프로필 대시보드가 여기 렌더됨 -->
    </section>

    <section class="menu-section">
      <h2>새 토너먼트</h2>
      <div class="form-row">
        <label>AI 상대 수
          <select id="opponents">
            <option value="1">1명 (헤즈업)</option>
            <option value="2">2명</option>
            <option value="3">3명</option>
            <option value="4">4명</option>
            <option value="5" selected>5명 (6맥스)</option>
          </select>
        </label>
        <label>AI 난이도
          <select id="difficulty">
            <option value="beginner">초급</option>
            <option value="intermediate" selected>중급</option>
            <option value="advanced">고급</option>
            <option value="master">마스터</option>
          </select>
        </label>
        <label>시작 스택
          <input type="number" id="start-stack" value="1500" min="100" step="100">
        </label>
      </div>
      <label class="inline-toggle">
        <input type="checkbox" id="coaching-toggle" checked>
        <span>코칭 모드 (내 액션 전 권장 액션/승률 표시)</span>
      </label>
      <div class="button-row">
        <button id="start-btn" class="primary big">토너먼트 시작 ▶</button>
        <button id="training-btn" class="secondary big">🎓 훈련 모드</button>
      </div>
    </section>

    <section class="menu-section">
      <h2>지난 토너먼트 복기</h2>
      <div id="past-tournaments"></div>
    </section>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="topbar">
    <div id="topbar-info"></div>
    <div class="topbar-right">
      <label class="speed-select">
        <span>속도</span>
        <select id="game-speed">
          <option value="very_slow">🐌 매우 느리게</option>
          <option value="slow">느리게</option>
          <option value="normal" selected>보통</option>
          <option value="fast">빠르게</option>
          <option value="instant">⚡ 즉시</option>
        </select>
      </label>
      <label class="speed-select">
        <input type="checkbox" id="manual-advance">
        <span>핸드 마다 정지</span>
      </label>
      <button id="quit-btn" class="ghost">메뉴로</button>
    </div>
  </div>
  <div class="game-body">
    <aside id="message-log">
      <div class="log-header">
        <span>핸드 로그</span>
        <button class="log-clear-btn" title="로그 지우기" onclick="document.getElementById('log-entries').innerHTML=''">🗑</button>
      </div>
      <div id="log-entries"></div>
      <div id="log-chat">
        <div class="log-chat-header">
          <span>🤖 AI 코치에게 바로 묻기</span>
          <button class="log-clear-btn" title="대화 지우기" onclick="document.getElementById('log-chat-messages').innerHTML=''">🗑</button>
        </div>
        <div id="log-chat-messages"></div>
        <div class="log-chat-quick">
          <button onclick="quickLogAsk('지금 이 상황 분석해줘')">지금 분석</button>
          <button onclick="quickLogAsk('방금 핸드 내가 잘 플레이했어?')">방금 핸드 평가</button>
          <button onclick="quickLogAsk('상대 성향/레인지를 추측해줘')">상대 레인지</button>
        </div>
        <div class="log-chat-input-row">
          <input id="log-chat-input" placeholder="질문 입력 후 Enter…" onkeydown="if(event.key==='Enter'){event.preventDefault();submitLogChat();}">
          <button class="primary" onclick="submitLogChat()">↵</button>
        </div>
      </div>
    </aside>
    <div class="game-main">
      <div id="table"></div>
      <div id="coaching-bar"></div>
      <div id="action-panel">
        <div id="hero-info"></div>
        <div id="action-buttons">
          <button id="btn-fold">폴드</button>
          <button id="btn-check-call">체크</button>
          <button id="btn-raise">레이즈</button>
          <button id="btn-allin">올인</button>
        </div>
        <div id="raise-controls">
          <div class="preset-row">
            <button id="btn-bet-min" class="preset">최소</button>
            <button id="btn-bet-half" class="preset">½팟</button>
            <button id="btn-bet-pot" class="preset">팟</button>
            <button id="btn-bet-2x" class="preset">2×팟</button>
          </div>
          <input type="range" id="raise-slider">
          <input type="number" id="raise-amount">
        </div>
      </div>
    </div>
  </div>
  <div id="toast-host"></div>
</div>

<div id="screen-training" class="screen">
  <div class="topbar">
    <button class="ghost" onclick="showScreen('menu'); renderProfileCard(); refreshPastList();">◀ 메뉴</button>
    <h2 style="margin:0; font-size:16px; color:#bcd4f6">🎓 훈련 모드</h2>
  </div>
  <div class="training-wrap">
    <div id="training-hub"></div>
    <div id="training-drill" style="display:none"></div>
    <div id="training-lesson" style="display:none"></div>
    <div id="training-achievements" style="display:none"></div>
  </div>
</div>

<div id="screen-review" class="screen">
  <div class="topbar">
    <button id="back-to-menu" class="ghost">◀ 메뉴로</button>
    <h2 id="review-title"></h2>
  </div>
  <div class="review-wrap">
    <div class="review-left">
      <h3>핸드 목록</h3>
      <div id="hand-list"></div>
    </div>
    <div class="review-right">
      <div id="review-table"></div>
      <div id="review-step-info" class="step-info"></div>
      <div class="review-controls">
        <button id="review-hand-prev">« 이전 핸드</button>
        <button id="review-prev">◀ 스텝</button>
        <input type="range" id="review-scrubber" min="0" max="0" value="0" style="flex:1">
        <button id="review-next">스텝 ▶</button>
        <button id="review-hand-next">다음 핸드 »</button>
      </div>
      <div id="review-analysis"></div>
    </div>
  </div>
</div>

<!-- 로컬 설정 (깃 제외). 존재하지 않으면 UI에서 키 입력 -->
<script src="js/config.local.js?v=6" onerror="this.remove()"></script>
<script src="js/cards.js?v=6"></script>
<script src="js/glossary.js?v=6"></script>
<script src="js/equity.js?v=6"></script>
<script src="js/ranges.js?v=6"></script>
<script src="js/coach.js?v=6"></script>
<script src="js/aicoach.js?v=6"></script>
<script src="js/training.js?v=6"></script>
<script src="js/ai.js?v=6"></script>
<script src="js/engine.js?v=6"></script>
<script src="js/ui.js?v=6"></script>
<script src="js/review.js?v=6"></script>
<script src="js/app.js?v=6"></script>
<!-- 플로팅 AI 코치 -->
<button id="ai-chat-toggle" class="ai-chat-toggle" title="AI 코치에게 물어보기" onclick="toggleAIChat()">🤖</button>
<div id="ai-chat-panel" class="ai-chat-panel">
  <div class="ai-chat-header">
    <span>🤖 AI 포커 코치</span>
    <div class="ai-chat-header-actions">
      <button class="ghost" onclick="resetAIChat()" title="대화 초기화">🔄</button>
      <button class="ghost" onclick="clearAIKey()" title="키/설정 변경">⚙️</button>
      <button class="ghost" onclick="toggleAIChat()" title="닫기">✕</button>
    </div>
  </div>
  <div id="ai-chat-body" class="ai-chat-body"></div>
  <div class="ai-chat-input-row">
    <input id="ai-chat-input" placeholder="이 상황 어떻게 플레이할까?" onkeydown="if(event.key==='Enter'){event.preventDefault();submitAIChat();}">
    <button id="ai-chat-send" class="primary" onclick="submitAIChat()">보내기</button>
  </div>
</div>
</body>
</html>
